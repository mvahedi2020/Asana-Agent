<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asana AI Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    #app { width: 100%; max-width: 780px; height: 88vh; background: #ffffff; border-radius: 28px; border: 1.5px solid #d0d0d0; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    #header { padding: 18px 26px; border-bottom: 1.5px solid #d0d0d0; display: flex; align-items: center; gap: 10px; background: linear-gradient(135deg, #ffffff, #f0f4ff); border-radius: 28px 28px 0 0; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 7px #22c55e; }
    .title { font-size: 15px; font-weight: 700; color: #1a1a1a; flex: 1; }
    .clear-btn { padding: 6px 12px; font-size: 12px; border-radius: 16px; border: 1px solid #d0d0d0; background: #fff; cursor: pointer; color: #666; font-family: 'Nunito', sans-serif; font-weight: 600; transition: all 0.15s; }
    .clear-btn:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 18px; background: #ffffff; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 4px; }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .avatar.agent { background: #e8f0fe; color: #1a56db; border: 1.5px solid #c0d4fb; }
    .avatar.user { background: #e6f4ea; color: #1a7a3a; border: 1.5px solid #b6dfc0; }
    .bubble { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 13.5px; line-height: 1.65; color: #1a1a1a; background: #f7f7f7; border: 1.5px solid #d0d0d0; }
    .msg.user .bubble { background: #eff6ff; border-color: #c0d4fb; color: #1e3a5f; border-radius: 20px 4px 20px 20px; }
    .msg.agent .bubble { border-radius: 4px 20px 20px 20px; }
    .bubble.typing { color: #888; font-style: italic; }
    #suggestions { padding: 10px 24px; display: flex; gap: 8px; flex-wrap: wrap; border-top: 1.5px solid #d0d0d0; background: #ffffff; }
    .chip { font-size: 12px; padding: 7px 14px; border-radius: 20px; border: 1.5px solid #d0d0d0; color: #444; cursor: pointer; background: #fff; transition: all 0.15s; white-space: nowrap; font-family: 'Nunito', sans-serif; font-weight: 600; }
    .chip:hover { background: #1a56db; color: #fff; border-color: #1a56db; }
    #inputbar { padding: 14px 18px; border-top: 1.5px solid #d0d0d0; display: flex; gap: 8px; align-items: center; background: #ffffff; border-radius: 0 0 28px 28px; }
    #userinput { flex: 1; padding: 11px 16px; font-size: 13.5px; border-radius: 20px; border: 1.5px solid #d0d0d0; background: #f7f7f7; color: #1a1a1a; font-family: 'Nunito', sans-serif; outline: none; transition: border 0.15s; }
    #userinput::placeholder { color: #aaa; }
    #userinput:focus { border-color: #1a56db; background: #fff; }
    #sendbtn { padding: 11px 22px; font-size: 13px; border-radius: 20px; border: none; background: #1a56db; color: #fff; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; transition: background 0.15s; }
    #sendbtn:hover { background: #1440a0; }
    #sendbtn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="dot"></div>
    <div class="title">Asana AI Agent</div>
    <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
  </div>
  <div id="messages">
    <div class="msg agent">
      <div class="avatar agent">AI</div>
      <div class="bubble">Hey! I'm your Asana AI agent. I can read your tasks, prioritize them, surface blockers, and take actions on your behalf. What would you like to do?</div>
    </div>
  </div>
  <div id="suggestions">
    <div class="chip" onclick="sendMsg(this.innerText)">Show all tasks</div>
    <div class="chip" onclick="sendMsg(this.innerText)">What should I focus on today?</div>
    <div class="chip" onclick="sendMsg(this.innerText)">Any blockers or overdue tasks?</div>
    <div class="chip" onclick="sendMsg(this.innerText)">Summarize project health</div>
  </div>
  <div id="inputbar">
    <input id="userinput" placeholder="Ask your agent anything..." />
    <button id="sendbtn" onclick="sendFromInput()">Send</button>
  </div>
</div>
<script>
  const BACKEND = "https://kaylen-nondutiable-myriam.ngrok-free.dev";
  const msgs = document.getElementById("messages");
  const input = document.getElementById("userinput");
  const btn = document.getElementById("sendbtn");
  let history = [];
  let busy = false;
  function addMsg(role, text, isTyping=false) {
    const div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "user" : "agent");
    const av = document.createElement("div");
    av.className = "avatar " + (role === "user" ? "user" : "agent");
    av.innerText = role === "user" ? "MO" : "AI";
    const bub = document.createElement("div");
    bub.className = "bubble" + (isTyping ? " typing" : "");
    bub.innerHTML = text.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    div.appendChild(av);
    div.appendChild(bub);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return bub;
  }
  async function sendMsg(text) {
    if (busy || !text.trim()) return;
    busy = true;
    btn.disabled = true;
    input.value = "";
    addMsg("user", text);
    history.push({ role: "user", content: text });
    const typingBub = addMsg("agent", "Checking Asana...", true);
    try {
      const res = await fetch(`${BACKEND}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      const reply = data.content?.find((b) => b.type === "text")?.text || "No response.";
      typingBub.classList.remove("typing");
      typingBub.innerHTML = reply.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
      history.push({ role: "assistant", content: reply });
    } catch(e) {
      typingBub.classList.remove("typing");
      typingBub.innerText = "Error reaching the agent. Please try again.";
    }
    msgs.scrollTop = msgs.scrollHeight;
    busy = false;
    btn.disabled = false;
  }
  function sendFromInput() { sendMsg(input.value.trim()); }
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendFromInput(); }
  });
  function clearChat() {
    history = [];
    msgs.innerHTML = `
      <div class="msg agent">
        <div class="avatar agent">AI</div>
        <div class="bubble">Hey! I'm your Asana AI agent. I can read your tasks, prioritize them, surface blockers, and take actions on your behalf. What would you like to do?</div>
      </div>
    `;
    localStorage.removeItem("asana_chat_history");
  }
</script>
</body>
</html>
