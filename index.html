<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asana AI Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #1c1c1e; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    #app { width: 100%; max-width: 780px; height: 88vh; background: #2a2a2d; border-radius: 16px; border: 1px solid #ff6a00; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 32px rgba(0,0,0,0.4); }
    #header { padding: 16px 24px; border-bottom: 1px solid #ff6a00; display: flex; align-items: center; gap: 10px; background: #242427; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #1a56db; box-shadow: 0 0 6px #1a56db; }
    .title { font-size: 15px; font-weight: 600; color: #f5f5f5; }
    .sub { font-size: 12px; color: #888; margin-left: auto; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 18px; background: #1c1c1e; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #ff6a00; border-radius: 4px; }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .avatar.agent { background: #1a3a5c; color: #60a5fa; border: 1px solid #1e4d8c; }
    .avatar.user { background: #2d1f0e; color: #ff6a00; border: 1px solid #ff6a00; }
    .bubble { max-width: 75%; padding: 11px 15px; border-radius: 14px; font-size: 13.5px; line-height: 1.65; color: #e5e5e5; background: #2a2a2d; border: 1px solid #ff6a00; }
    .msg.user .bubble { background: #1e2a3a; border-color: #3b82f6; color: #bfdbfe; }
    .bubble.typing { color: #888; font-style: italic; }
    #suggestions { padding: 10px 24px; display: flex; gap: 8px; flex-wrap: wrap; border-top: 1px solid #ff6a00; background: #242427; }
    .chip { font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid #ff6a00; color: #ff6a00; cursor: pointer; background: transparent; transition: all 0.15s; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
    .chip:hover { background: #ff6a00; color: #1c1c1e; }
    #inputbar { padding: 14px 18px; border-top: 1px solid #ff6a00; display: flex; gap: 8px; align-items: center; background: #242427; }
    #userinput { flex: 1; padding: 10px 14px; font-size: 13.5px; border-radius: 10px; border: 1px solid #3d3d40; background: #1c1c1e; color: #f5f5f5; font-family: 'DM Sans', sans-serif; outline: none; transition: border 0.15s; }
    #userinput::placeholder { color: #555; }
    #userinput:focus { border-color: #ff6a00; }
    #sendbtn { padding: 10px 20px; font-size: 13px; border-radius: 10px; border: none; background: #3b82f6; color: #fff; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; transition: background 0.15s; }
    #sendbtn:hover { background: #2563eb; }
    #sendbtn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="dot"></div>
    <div class="title">Asana AI Agent</div>
    <div class="sub">B2B Commerce Platform v2.0</div>
  </div>
  <div id="messages">
    <div class="msg agent">
      <div class="avatar agent">AI</div>
      <div class="bubble">Hey! I'm your Asana AI agent. I can read your tasks, prioritize them, surface blockers, and take actions on your behalf. What would you like to do?</div>
    </div>
  </div>
  <div id="suggestions">
    <div class="chip" onclick="sendMsg(this.innerText)">Show all tasks</div>
    <div class="chip" onclick="sendMsg(this.innerText)">What should I focus on today?</div>
    <div class="chip" onclick="sendMsg(this.innerText)">Any blockers or overdue tasks?</div>
    <div class="chip" onclick="sendMsg(this.innerText)">Summarize project health</div>
  </div>
  <div id="inputbar">
    <input id="userinput" placeholder="Ask your agent anything..." />
    <button id="sendbtn" onclick="sendFromInput()">Send</button>
  </div>
</div>
<script>
  const BACKEND = "https://kaylen-nondutiable-myriam.ngrok-free.dev";
  const msgs = document.getElementById("messages");
  const input = document.getElementById("userinput");
  const btn = document.getElementById("sendbtn");
  let history = [];
  let busy = false;
  function addMsg(role, text, isTyping=false) {
    const div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "user" : "agent");
    const av = document.createElement("div");
    av.className = "avatar " + (role === "user" ? "user" : "agent");
    av.innerText = role === "user" ? "MO" : "AI";
    const bub = document.createElement("div");
    bub.className = "bubble" + (isTyping ? " typing" : "");
    bub.innerHTML = text.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    div.appendChild(av);
    div.appendChild(bub);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return bub;
  }
  async function sendMsg(text) {
    if (busy || !text.trim()) return;
    busy = true;
    btn.disabled = true;
    input.value = "";
    addMsg("user", text);
    history.push({ role: "user", content: text });
    const typingBub = addMsg("agent", "Checking Asana...", true);
    try {
      const res = await fetch(`${BACKEND}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      const reply = data.content?.find((b) => b.type === "text")?.text || "No response.";
      typingBub.classList.remove("typing");
      typingBub.innerHTML = reply.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
      history.push({ role: "assistant", content: reply });
    } catch(e) {
      typingBub.classList.remove("typing");
      typingBub.innerText = "Error reaching the agent. Please try again.";
    }
    msgs.scrollTop = msgs.scrollHeight;
    busy = false;
    btn.disabled = false;
  }
  function sendFromInput() { sendMsg(input.value.trim()); }
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendFromInput(); }
  });
</script>
</body>
</html>
